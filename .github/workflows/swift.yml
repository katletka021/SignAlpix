name: Build SignAlpix-beta IPA

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
    
    - name: Setup Xcode
      run: |
        sudo xcode-select -switch /Applications/Xcode.app
        echo "Xcode version:"
        xcodebuild -version
    
    - name: Create Xcode project structure
      run: |
        mkdir -p SignAlpix-beta/Sources/App
        mkdir -p SignAlpix-beta/Sources/Controllers
        mkdir -p SignAlpix-beta/Resources
        
        # Копируем все swift файлы
        cp -r Sources/* SignAlpix-beta/Sources/ 2>/dev/null || true
        
        # Создаем Info.plist
        cat > SignAlpix-beta/Info.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>$(DEVELOPMENT_LANGUAGE)</string>
            <key>CFBundleDisplayName</key>
            <string>SignAlpix-beta</string>
            <key>CFBundleExecutable</key>
            <string>$(EXECUTABLE_NAME)</string>
            <key>CFBundleIdentifier</key>
            <string>com.geto320.signalpixbeta</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>SignAlpix-beta</string>
            <key>CFBundlePackageType</key>
            <string>$(PRODUCT_BUNDLE_PACKAGE_TYPE)</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UIApplicationSceneManifest</key>
            <dict>
                <key>UIApplicationSupportsMultipleScenes</key>
                <false/>
            </dict>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
                <string>armv7</string>
            </array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
                <string>UIInterfaceOrientationPortrait</string>
            </array>
            <key>UISupportedInterfaceOrientations~ipad</key>
            <array>
                <string>UIInterfaceOrientationPortrait</string>
                <string>UIInterfaceOrientationPortraitUpsideDown</string>
                <string>UIInterfaceOrientationLandscapeLeft</string>
                <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
        </dict>
        </plist>
        EOF
    
    - name: Generate Xcode project
      run: |
        cd SignAlpix-beta
        echo "// Generated project" > project.yml
        cat > project.yml << 'YML'
        name: SignAlpix-beta
        targets:
          SignAlpix-beta:
            type: application
            platform: iOS
            deploymentTarget: "15.0"
            sources: [Sources]
            info:
              path: Info.plist
            settings:
              base:
                PRODUCT_BUNDLE_IDENTIFIER: com.geto320.signalpixbeta
                CODE_SIGN_STYLE: Manual
                DEVELOPMENT_TEAM: ""
                CODE_SIGN_IDENTITY: iPhone Developer
        YML
    
    - name: Install xcodegen
      run: brew install xcodegen
    
    - name: Generate Xcode project with xcodegen
      run: |
        cd SignAlpix-beta
        xcodegen generate
    
    - name: Build IPA
      run: |
        cd SignAlpix-beta
        xcodebuild -project SignAlpix-beta.xcodeproj \
          -scheme SignAlpix-beta \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/SignAlpix-beta.xcarchive \
          archive
        
        xcodebuild -exportArchive \
          -archivePath build/SignAlpix-beta.xcarchive \
          -exportPath build/ipa \
          -exportOptionsPlist exportOptions.plist
    
    - name: Create exportOptions.plist
      run: |
        cat > SignAlpix-beta/exportOptions.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict/>
        </dict>
        </plist>
        EOF
    
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: SignAlpix-beta
        path: SignAlpix-beta/build/ipa/*.ipa
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: SignAlpix-beta/build/ipa/*.ipa
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
